<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - BOOM PIXEL</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Satoshi:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <!-- Navigation -->
  <nav>
    <div class="logo">BOOM PIXEL</div>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="cars.html">Cars</a></li>
      <li><a href="businesses.html">Art Gallery</a></li>
      <li><a href="personalities.html">Personalities</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <!-- Page Hero with Image -->
<section class="page-hero">
  <img src="assets/images/contact/hero.jpg" alt="Contact Boom Pixel" class="page-hero-bg">
  <div class="page-hero-overlay"></div>
  <div class="page-hero-content">
    <h1>Contact Us</h1>
    <p>Let's create something explosive together</p>
  </div>
</section>

  <section class="contact-section">
    <div class="contact-info">
      <div class="contact-item">
        <i class="fab fa-whatsapp"></i>
        <strong>WhatsApp:</strong>
        <a href="https://wa.me/255755143519" target="_blank">+255 755 143 519</a>
      </div>
      
      <div class="contact-item">
        <i class="fab fa-instagram"></i>
        <strong>Instagram:</strong>
        <a href="https://instagram.com/boom_.pixel" target="_blank">@boom_.pixel</a>
      </div>
      
      <div class="contact-item">
        <i class="fas fa-envelope"></i>
        <strong>Email:</strong>
        <a href="mailto:forturence18@gmail.com">forturence18@gmail.com</a>
      </div>
      
      <div class="contact-item">
        <i class="fas fa-map-marker-alt"></i>
        <strong>Location:</strong>
        <span>Dar es Salaam, Tanzania</span>
      </div>
    </div>

    <form class="contact-form">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>
      </div>
      
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>
      
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" required></textarea>
      </div>
      
      <button type="submit" class="btn-primary">Send Message</button>
    </form>
  </section>

  <script src="js/script.js"></script>
</body>
</html>
