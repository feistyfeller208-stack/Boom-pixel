<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎨 The Infinite Museum | Interactive Art Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: 'Inter', 'Poppins', 'Segoe UI', sans-serif;
            background: #0a0a1a;
            color: #fff;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* UI Overlay */
        .ui-overlay {
            position: fixed;
            z-index: 100;
            pointer-events: none;
        }

        .museum-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
            padding: 20px 30px;
            pointer-events: none;
            z-index: 101;
        }

        .museum-title {
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #fff, #aaccff, #88aaff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .museum-subtitle {
            font-size: 0.7rem;
            opacity: 0.6;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        .mini-map {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 15px;
            pointer-events: auto;
            z-index: 101;
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            width: 180px;
        }

        .mini-map:hover {
            transform: scale(1.02);
            border-color: rgba(100, 150, 255, 0.5);
        }

        .map-title {
            font-size: 0.7rem;
            margin-bottom: 10px;
            color: #aaf;
            text-align: center;
        }

        .map-grid {
            position: relative;
            width: 150px;
            height: 150px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            margin: 0 auto;
            overflow: hidden;
        }

        .map-dot {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            opacity: 0.3;
        }

        .map-position {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #ffaa44;
            border-radius: 50%;
            box-shadow: 0 0 8px #ffaa44;
            transition: all 0.1s ease;
        }

        .map-coords {
            text-align: center;
            font-size: 0.6rem;
            margin-top: 8px;
            color: #88aaff;
            font-family: monospace;
        }

        .bookmark-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 12px 18px;
            pointer-events: auto;
            z-index: 101;
            cursor: pointer;
            border: 1px solid rgba(255, 215, 0, 0.3);
            transition: all 0.3s ease;
        }

        .bookmark-panel:hover {
            background: rgba(0, 0, 0, 0.85);
            transform: scale(1.02);
        }

        .bookmark-icon {
            font-size: 1.3rem;
        }

        .bookmark-count {
            background: #ffaa44;
            color: #000;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 0.7rem;
            margin-left: 8px;
            font-weight: bold;
        }

        .gallery-info {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 15px;
            padding: 8px 15px;
            font-size: 0.7rem;
            font-family: monospace;
            pointer-events: none;
            z-index: 101;
        }

        .controls-hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.65rem;
            pointer-events: none;
            z-index: 101;
            white-space: nowrap;
            font-family: monospace;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(20px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .modal.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #0f0f1a);
            border-radius: 30px;
            max-width: 650px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 35px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.5);
            transform: scale(0.9);
            transition: transform 0.3s ease;
            position: relative;
        }

        .modal.active .modal-content {
            transform: scale(1);
        }

        .modal-image {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .modal h2 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #fff, #aaccff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .tech-stack {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 20px 0;
        }

        .tech-badge {
            background: rgba(100, 150, 255, 0.2);
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            border: 1px solid rgba(100, 150, 255, 0.3);
        }

        .modal-stats {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            padding: 15px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-stat {
            flex: 1;
            text-align: center;
        }

        .modal-stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffaa66;
        }

        .modal-stat-label {
            font-size: 0.65rem;
            opacity: 0.7;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 28px;
            cursor: pointer;
            color: #888;
            transition: color 0.2s;
        }

        .close-modal:hover {
            color: #fff;
        }

        .bookmark-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 215, 0, 0.5);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.2s;
        }

        .bookmark-btn:hover {
            transform: scale(1.1);
            background: rgba(255, 215, 0, 0.3);
        }

        @media (max-width: 768px) {
            .museum-title { font-size: 1.2rem; }
            .mini-map { width: 140px; padding: 10px; }
            .map-grid { width: 120px; height: 120px; }
            .modal-content { padding: 20px; }
            .modal h2 { font-size: 1.3rem; }
        }

        /* Loading indicator */
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 20px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="loading" id="loading">🎨 Loading Museum... <span id="load-progress">0</span>%</div>

    <div class="ui-overlay">
        <div class="museum-header">
            <div class="museum-title">✦ INFINITE MUSEUM ✦</div>
            <div class="museum-subtitle">YOUR PERSONAL ART GALLERY | ADD YOUR PROJECTS</div>
        </div>
        
        <div class="mini-map" id="mini-map">
            <div class="map-title">🗺️ GALLERY MAP</div>
            <div class="map-grid" id="map-grid"></div>
            <div class="map-coords" id="map-coords">X: 0 | Y: 0</div>
        </div>
        
        <div class="bookmark-panel" id="bookmark-panel">
            <span class="bookmark-icon">🔖</span> MY COLLECTION
            <span class="bookmark-count" id="bookmark-count">0</span>
        </div>
        
        <div class="gallery-info">
            🎨 <span id="visible-count">0</span> artworks visible
        </div>
        
        <div class="controls-hint">
            🖱️ DRAG TO PAN | SCROLL TO ZOOM | CLICK ARTWORK TO VIEW
        </div>
    </div>

    <div class="modal" id="artwork-modal">
        <div class="modal-content">
            <span class="close-modal" id="close-modal">&times;</span>
            <img class="modal-image" id="modal-image" src="" alt="Artwork">
            <h2 id="modal-title">The Infinite Canvas</h2>
            <p id="modal-desc"></p>
            <div class="tech-stack" id="modal-tech"></div>
            <div class="modal-stats">
                <div class="modal-stat"><div class="modal-stat-value" id="modal-date">0</div><div class="modal-stat-label">📅 CREATED</div></div>
                <div class="modal-stat"><div class="modal-stat-value" id="modal-category">0</div><div class="modal-stat-label">🏷️ CATEGORY</div></div>
            </div>
            <div class="modal-buttons">
                <button class="btn btn-primary" id="modal-demo">🔗 VIEW PROJECT</button>
                <button class="btn btn-secondary" id="modal-github">📂 MORE INFO</button>
            </div>
            <div class="bookmark-btn" id="modal-bookmark">🔖</div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        
        // ========== LOAD YOUR GALLERY CONFIGURATION ==========
        // This is where you'll add your artwork!
        // Edit gallery-config.js to add your projects with real photos
        
        let galleryConfig = null;
        let loadedImages = 0;
        const totalImages = 0;
        
        async function loadGalleryConfig() {
            try {
                // First try to load external config file
                const response = await fetch('gallery-config.js');
                if (response.ok) {
                    const script = await response.text();
                    eval(script);
                    galleryConfig = window.GALLERY_CONFIG;
                }
            } catch (e) {
                console.log('No external config found, using default');
            }
            
            // Fallback default configuration (replace with your projects!)
            if (!galleryConfig) {
                galleryConfig = {
                    title: "My Digital Gallery",
                    subtitle: "Interactive 3D Portfolio",
                    artworks: [
                        {
                            id: 1,
                            name: "✨ Your First Project",
                            description: "Add your project description here. Click the bookmark button to save favorites!",
                            imageUrl: "https://picsum.photos/id/1015/800/1000",
                            techStack: ["React", "Three.js", "WebGL"],
                            category: "Web Development",
                            date: "2024",
                            demoUrl: "#",
                            infoUrl: "#",
                            position: { x: 0, y: 0 }
                        },
                        {
                            id: 2,
                            name: "🎨 Add Your Artwork",
                            description: "Upload real photos to images/projects/ and update this config file",
                            imageUrl: "https://picsum.photos/id/104/800/1000",
                            techStack: ["Photography", "Design"],
                            category: "Art",
                            date: "2024",
                            demoUrl: "#",
                            infoUrl: "#"
                        },
                        {
                            id: 3,
                            name: "📸 Real Photos Here",
                            description: "Place your images in the images/projects/ folder and reference them here",
                            imageUrl: "https://picsum.photos/id/169/800/1000",
                            techStack: ["Portfolio", "Gallery"],
                            category: "Photography",
                            date: "2024",
                            demoUrl: "#",
                            infoUrl: "#"
                        }
                    ]
                };
            }
            
            document.getElementById('loading').style.display = 'none';
            return galleryConfig;
        }
        
        // Initialize museum with your artwork
        async function initMuseum() {
            const config = await loadGalleryConfig();
            document.title = config.title || "Infinite Museum";
            document.querySelector('.museum-title').textContent = config.title || "✦ INFINITE MUSEUM ✦";
            document.querySelector('.museum-subtitle').textContent = config.subtitle || "YOUR PERSONAL ART GALLERY";
            
            startThreeJsMuseum(config.artworks);
        }
        
        // Three.js museum setup
        function startThreeJsMuseum(artworks) {
            const container = document.getElementById('canvas-container');
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050510);
            scene.fog = new THREE.FogExp2(0x050510, 0.008);

            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 15);
            
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0x22223b);
            scene.add(ambientLight);
            
            const mainLight = new THREE.DirectionalLight(0xffffff, 1);
            mainLight.position.set(5, 10, 7);
            scene.add(mainLight);
            
            const fillLight = new THREE.PointLight(0x4466cc, 0.5);
            fillLight.position.set(-3, 2, 4);
            scene.add(fillLight);
            
            const backLight = new THREE.PointLight(0xff66aa, 0.3);
            backLight.position.set(0, 0, -8);
            scene.add(backLight);
            
            // Texture loader with progress
            const textureLoader = new THREE.TextureLoader();
            let loadedTextures = 0;
            const totalTextures = artworks.length;
            
            // Create artworks with images
            const artworkMeshes = [];
            const group = new THREE.Group();
            
            artworks.forEach((art, idx) => {
                const width = 1.8;
                const height = 2.2;
                
                // Frame material
                const frameMat = new THREE.MeshStandardMaterial({
                    color: 0xffaa66,
                    metalness: 0.85,
                    roughness: 0.25,
                    emissive: 0x442200,
                    emissiveIntensity: 0.1
                });
                
                const frame = new THREE.Mesh(new THREE.BoxGeometry(width, height, 0.1), frameMat);
                
                // Load image
                const imageUrl = art.imageUrl || `https://picsum.photos/id/${(idx % 100) + 1}/400/500`;
                const texture = textureLoader.load(imageUrl, 
                    () => {
                        loadedTextures++;
                        const progress = Math.floor((loadedTextures / totalTextures) * 100);
                        document.getElementById('load-progress').textContent = progress;
                        if (loadedTextures === totalTextures) {
                            document.getElementById('loading').style.display = 'none';
                        }
                    },
                    undefined,
                    (err) => {
                        console.warn(`Could not load ${imageUrl}, using fallback`);
                    }
                );
                
                const canvasMat = new THREE.MeshStandardMaterial({
                    map: texture,
                    emissive: new THREE.Color().setHSL(art.id * 0.1, 0.7, 0.5),
                    emissiveIntensity: 0.1,
                    roughness: 0.2,
                    metalness: 0.05,
                    side: THREE.DoubleSide
                });
                
                const canvas = new THREE.Mesh(new THREE.BoxGeometry(width - 0.2, height - 0.2, 0.12), canvasMat);
                canvas.position.z = 0.06;
                frame.add(canvas);
                
                // Position in grid
                const spacing = 3.2;
                const cols = 12;
                const gridX = (idx % cols) - (cols / 2);
                const gridY = Math.floor(idx / cols) - 4;
                frame.position.x = gridX * spacing;
                frame.position.y = -gridY * spacing;
                frame.position.z = 0;
                
                frame.userData = { artwork: art, id: art.id };
                
                group.add(frame);
                artworkMeshes.push(frame);
            });
            
            scene.add(group);
            
            // Add floating particles
            const particleCount = 2000;
            const particleGeo = new THREE.BufferGeometry();
            const particlePositions = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount; i++) {
                particlePositions[i*3] = (Math.random() - 0.5) * 50;
                particlePositions[i*3+1] = (Math.random() - 0.5) * 40;
                particlePositions[i*3+2] = (Math.random() - 0.5) * 30 - 10;
            }
            particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
            const particleMat = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.05, transparent: true, opacity: 0.3 });
            const particles = new THREE.Points(particleGeo, particleMat);
            scene.add(particles);
            
            // Controls
            let targetX = 0, targetY = 0, currentX = 0, currentY = 0;
            let targetZoom = 15, currentZoom = 15;
            let isDragging = false;
            let dragStart = { x: 0, y: 0 };
            let dragOffset = { x: 0, y: 0 };
            
            renderer.domElement.addEventListener('mousedown', (e) => {
                if (e.button === 0) {
                    isDragging = true;
                    dragStart.x = e.clientX;
                    dragStart.y = e.clientY;
                    dragOffset.x = targetX;
                    dragOffset.y = targetY;
                    renderer.domElement.style.cursor = 'grabbing';
                }
            });
            
            window.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    targetX = dragOffset.x + (e.clientX - dragStart.x) * 0.015;
                    targetY = dragOffset.y + (e.clientY - dragStart.y) * 0.015;
                    updateMapPosition();
                }
            });
            
            window.addEventListener('mouseup', () => {
                isDragging = false;
                renderer.domElement.style.cursor = 'grab';
            });
            
            window.addEventListener('wheel', (e) => {
                targetZoom += e.deltaY * 0.02;
                targetZoom = Math.max(5, Math.min(30, targetZoom));
                e.preventDefault();
            }, { passive: false });
            
            renderer.domElement.style.cursor = 'grab';
            
            // Map position display
            const mapCoordsSpan = document.getElementById('map-coords');
            const visibleCountSpan = document.getElementById('visible-count');
            
            function updateMapPosition() {
                mapCoordsSpan.textContent = `X: ${Math.floor(targetX * 10) / 10} | Y: ${Math.floor(targetY * 10) / 10}`;
            }
            
            // Click handler
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            
            // Modal handling
            const modal = document.getElementById('artwork-modal');
            const closeModal = document.getElementById('close-modal');
            let bookmarkedIds = JSON.parse(localStorage.getItem('museumBookmarks') || '[]');
            
            function updateBookmarkUI() {
                document.getElementById('bookmark-count').textContent = bookmarkedIds.length;
                localStorage.setItem('museumBookmarks', JSON.stringify(bookmarkedIds));
            }
            
            function toggleBookmark(id) {
                const index = bookmarkedIds.indexOf(id);
                if (index === -1) {
                    bookmarkedIds.push(id);
                } else {
                    bookmarkedIds.splice(index, 1);
                }
                updateBookmarkUI();
                return !(index === -1);
            }
            
            updateBookmarkUI();
            
            function showModal(artwork) {
                document.getElementById('modal-image').src = artwork.imageUrl || '';
                document.getElementById('modal-title').textContent = artwork.name;
                document.getElementById('modal-desc').textContent = artwork.description || 'No description available.';
                const techDiv = document.getElementById('modal-tech');
                techDiv.innerHTML = (artwork.techStack || []).map(t => `<span class="tech-badge">${t}</span>`).join('');
                document.getElementById('modal-date').textContent = artwork.date || '2024';
                document.getElementById('modal-category').textContent = artwork.category || 'Artwork';
                
                const bookmarkBtn = document.getElementById('modal-bookmark');
                const isFav = bookmarkedIds.includes(artwork.id);
                bookmarkBtn.textContent = isFav ? '★' : '☆';
                bookmarkBtn.style.color = isFav ? '#ffaa44' : '#888';
                
                bookmarkBtn.onclick = () => {
                    const newState = toggleBookmark(artwork.id);
                    bookmarkBtn.textContent = newState ? '★' : '☆';
                    bookmarkBtn.style.color = newState ? '#ffaa44' : '#888';
                };
                
                document.getElementById('modal-demo').onclick = () => {
                    if (artwork.demoUrl && artwork.demoUrl !== '#') {
                        window.open(artwork.demoUrl, '_blank');
                    } else {
                        alert('📝 Add a demo URL to this artwork in gallery-config.js');
                    }
                };
                document.getElementById('modal-github').onclick = () => {
                    if (artwork.infoUrl && artwork.infoUrl !== '#') {
                        window.open(artwork.infoUrl, '_blank');
                    } else {
                        alert('📝 Add more info URL to this artwork in gallery-config.js');
                    }
                };
                
                modal.classList.add('active');
            }
            
            closeModal.onclick = () => modal.classList.remove('active');
            modal.onclick = (e) => { if (e.target === modal) modal.classList.remove('active'); };
            
            renderer.domElement.addEventListener('click', (e) => {
                const rect = renderer.domElement.getBoundingClientRect();
                mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
                
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(artworkMeshes, true);
                
                if (intersects.length > 0) {
                    let obj = intersects[0].object;
                    while (obj.parent && !obj.userData.artwork) {
                        obj = obj.parent;
                    }
                    if (obj.userData.artwork) {
                        showModal(obj.userData.artwork);
                    }
                }
            });
            
            // Animation
            let time = 0;
            
            function animate() {
                time += 0.016;
                
                currentX += (targetX - currentX) * 0.08;
                currentY += (targetY - currentY) * 0.08;
                currentZoom += (targetZoom - currentZoom) * 0.1;
                
                group.position.x = currentX;
                group.position.y = currentY;
                camera.position.z = currentZoom;
                
                particles.rotation.y += 0.001;
                
                renderer.render(scene, camera);
                requestAnimationFrame(animate);
            }
            
            animate();
            
            // Mini-map
            const mapGrid = document.getElementById('map-grid');
            for (let i = -3; i <= 3; i++) {
                for (let j = -3; j <= 3; j++) {
                    const dot = document.createElement('div');
                    dot.className = 'map-dot';
                    dot.style.left = `${(i + 3) * 20 + 5}px`;
                    dot.style.top = `${(j + 3) * 20 + 5}px`;
                    mapGrid.appendChild(dot);
                }
            }
            
            const mapPos = document.createElement('div');
            mapPos.className = 'map-position';
            mapGrid.appendChild(mapPos);
            
            function updateMapDot() {
                const xNorm = Math.max(-3, Math.min(3, currentX / 10));
                const yNorm = Math.max(-3, Math.min(3, currentY / 10));
                mapPos.style.left = `${(xNorm + 3) * 20 + 1}px`;
                mapPos.style.top = `${(yNorm + 3) * 20 + 1}px`;
                requestAnimationFrame(updateMapDot);
            }
            updateMapDot();
            
            document.getElementById('mini-map').addEventListener('click', () => {
                targetX = 0;
                targetY = 0;
                targetZoom = 15;
                updateMapPosition();
            });
            
            document.getElementById('bookmark-panel').addEventListener('click', () => {
                const bookmarked = artworks.filter(a => bookmarkedIds.includes(a.id));
                if (bookmarked.length === 0) {
                    alert('📭 Your collection is empty. Click the ★ button on any artwork to add it!');
                } else {
                    alert(`📚 YOUR COLLECTION (${bookmarked.length} pieces):\n\n${bookmarked.map(a => a.name).join('\n')}`);
                }
            });
        }
        
        // Start everything
        initMuseum();
    </script>
</body>
</html>
