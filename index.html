<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎨 Infinite Museum | Visible Art Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: 'Inter', 'Poppins', 'Segoe UI', sans-serif;
            background: #0a0a1a;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* UI Overlay */
        .ui-overlay {
            position: fixed;
            z-index: 100;
            pointer-events: none;
        }

        .museum-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
            padding: 20px 30px;
            z-index: 101;
        }

        .museum-title {
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #fff, #aaccff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .museum-subtitle {
            font-size: 0.7rem;
            opacity: 0.6;
            margin-top: 5px;
            color: white;
        }

        .controls-hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: white;
            z-index: 101;
            white-space: nowrap;
            font-family: monospace;
            pointer-events: none;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .modal.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #0f0f1a);
            border-radius: 30px;
            max-width: 500px;
            width: 90%;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transform: scale(0.9);
            transition: transform 0.3s ease;
            position: relative;
        }

        .modal.active .modal-content {
            transform: scale(1);
        }

        .modal h2 {
            color: #aaf;
            margin-bottom: 15px;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #888;
        }

        .btn {
            padding: 10px 20px;
            margin-top: 15px;
            background: #667eea;
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
        }

        .tech-stack {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 15px 0;
        }

        .tech-badge {
            background: rgba(102, 126, 234, 0.3);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="ui-overlay">
        <div class="museum-header">
            <div class="museum-title">✦ INFINITE MUSEUM ✦</div>
            <div class="museum-subtitle">DRAG TO EXPLORE | CLICK ON ARTWORK</div>
        </div>
        <div class="controls-hint">
            🖱️ DRAG TO PAN | SCROLL TO ZOOM | CLICK ANY FRAME
        </div>
    </div>

    <div class="modal" id="artwork-modal">
        <div class="modal-content">
            <span class="close-modal" id="close-modal">&times;</span>
            <h2 id="modal-title">Artwork</h2>
            <p id="modal-desc"></p>
            <div class="tech-stack" id="modal-tech"></div>
            <button class="btn" id="modal-demo">View Project</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ========== ARTWORK DATA WITH VISIBLE IMAGES ==========
        const artworks = [
            {
                id: 1,
                name: "🌊 Ocean Sunset",
                description: "A beautiful sunset over the Pacific Ocean",
                imageUrl: "https://picsum.photos/id/15/400/500",
                techStack: ["Photography", "Nature"],
                demoUrl: "#"
            },
            {
                id: 2,
                name: "🏔️ Mountain Peak",
                description: "Majestic mountain landscape at dawn",
                imageUrl: "https://picsum.photos/id/104/400/500",
                techStack: ["Landscape", "Adventure"],
                demoUrl: "#"
            },
            {
                id: 3,
                name: "🌌 Starry Night",
                description: "Deep space photography with stars and nebula",
                imageUrl: "https://picsum.photos/id/96/400/500",
                techStack: ["Astrophotography", "Long Exposure"],
                demoUrl: "#"
            },
            {
                id: 4,
                name: "🏙️ City Lights",
                description: "Urban夜景 with glowing cityscape",
                imageUrl: "https://picsum.photos/id/20/400/500",
                techStack: ["Urban", "Night Photography"],
                demoUrl: "#"
            },
            {
                id: 5,
                name: "🌸 Cherry Blossom",
                description: "Spring flowers in full bloom",
                imageUrl: "https://picsum.photos/id/96/400/500",
                techStack: ["Nature", "Macro"],
                demoUrl: "#"
            },
            {
                id: 6,
                name: "🎨 Abstract Art",
                description: "Digital abstract composition",
                imageUrl: "https://picsum.photos/id/30/400/500",
                techStack: ["Digital Art", "Abstract"],
                demoUrl: "#"
            },
            {
                id: 7,
                name: "🏖️ Beach Paradise",
                description: "Tropical beach with turquoise water",
                imageUrl: "https://picsum.photos/id/35/400/500",
                techStack: ["Travel", "Beach"],
                demoUrl: "#"
            },
            {
                id: 8,
                name: "🌲 Forest Path",
                description: "Misty morning forest trail",
                imageUrl: "https://picsum.photos/id/96/400/500",
                techStack: ["Forest", "Moody"],
                demoUrl: "#"
            }
        ];

        // Setup Scene
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        scene.fog = new THREE.FogExp2(0x050510, 0.005);

        // Camera
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 12);
        camera.lookAt(0, 0, 0);

        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Lighting - make everything bright and visible
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
        mainLight.position.set(5, 10, 7);
        scene.add(mainLight);
        
        const fillLight = new THREE.PointLight(0x88aaff, 0.6);
        fillLight.position.set(-3, 2, 5);
        scene.add(fillLight);
        
        const backLight = new THREE.PointLight(0xffaa88, 0.4);
        backLight.position.set(0, 2, -8);
        scene.add(backLight);
        
        // Add rim light to make edges pop
        const rimLight = new THREE.PointLight(0xffaa66, 0.5);
        rimLight.position.set(2, 3, -4);
        scene.add(rimLight);

        // Helper grid (optional - shows floor reference)
        const gridHelper = new THREE.GridHelper(30, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -2.5;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.3;
        scene.add(gridHelper);

        // Create artwork frames
        const group = new THREE.Group();
        const textureLoader = new THREE.TextureLoader();
        
        artworks.forEach((art, index) => {
            // Frame dimensions
            const frameWidth = 2.0;
            const frameHeight = 2.4;
            const frameDepth = 0.15;
            
            // Gold frame material
            const frameMaterial = new THREE.MeshStandardMaterial({
                color: 0xcdad5e,
                metalness: 0.85,
                roughness: 0.3,
                emissive: 0x442200,
                emissiveIntensity: 0.1
            });
            
            // Create frame (hollow effect)
            const frame = new THREE.Group();
            
            // Back plate
            const backPlate = new THREE.Mesh(
                new THREE.BoxGeometry(frameWidth, frameHeight, 0.05),
                new THREE.MeshStandardMaterial({ color: 0x2a2418, metalness: 0.2 })
            );
            backPlate.position.z = -0.05;
            frame.add(backPlate);
            
            // Load image texture
            const imageTexture = textureLoader.load(art.imageUrl);
            const imageMaterial = new THREE.MeshStandardMaterial({
                map: imageTexture,
                roughness: 0.2,
                metalness: 0.05
            });
            
            // Image canvas (slightly smaller than frame)
            const imageCanvas = new THREE.Mesh(
                new THREE.BoxGeometry(frameWidth - 0.2, frameHeight - 0.2, 0.08),
                imageMaterial
            );
            imageCanvas.position.z = 0.02;
            frame.add(imageCanvas);
            
            // Frame borders (top, bottom, left, right)
            const borderDepth = 0.12;
            const borderWidth = 0.12;
            
            // Top border
            const topBorder = new THREE.Mesh(
                new THREE.BoxGeometry(frameWidth, borderWidth, borderDepth),
                frameMaterial
            );
            topBorder.position.set(0, frameHeight/2 - borderWidth/2, 0.08);
            frame.add(topBorder);
            
            // Bottom border
            const bottomBorder = new THREE.Mesh(
                new THREE.BoxGeometry(frameWidth, borderWidth, borderDepth),
                frameMaterial
            );
            bottomBorder.position.set(0, -frameHeight/2 + borderWidth/2, 0.08);
            frame.add(bottomBorder);
            
            // Left border
            const leftBorder = new THREE.Mesh(
                new THREE.BoxGeometry(borderWidth, frameHeight - borderWidth*2, borderDepth),
                frameMaterial
            );
            leftBorder.position.set(-frameWidth/2 + borderWidth/2, 0, 0.08);
            frame.add(leftBorder);
            
            // Right border
            const rightBorder = new THREE.Mesh(
                new THREE.BoxGeometry(borderWidth, frameHeight - borderWidth*2, borderDepth),
                frameMaterial
            );
            rightBorder.position.set(frameWidth/2 - borderWidth/2, 0, 0.08);
            frame.add(rightBorder);
            
            // Position in grid
            const cols = 4;
            const spacingX = 3.5;
            const spacingY = 3.8;
            
            const row = Math.floor(index / cols);
            const col = index % cols;
            
            frame.position.x = (col - cols/2) * spacingX;
            frame.position.y = (row - 1) * spacingY;
            frame.position.z = 0;
            
            // Store artwork data
            frame.userData = { artwork: art };
            
            group.add(frame);
        });
        
        scene.add(group);
        
        // Add floating particles for atmosphere
        const particleCount = 1500;
        const particleGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 50;
            particlePositions[i*3+1] = (Math.random() - 0.5) * 35;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 20 - 10;
        }
        particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMaterial = new THREE.PointsMaterial({
            color: 0x88aaff,
            size: 0.06,
            transparent: true,
            opacity: 0.4,
            blending: THREE.AdditiveBlending
        });
        const particles = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(particles);
        
        // Add some floating orbs for decoration
        const orbs = [];
        for (let i = 0; i < 30; i++) {
            const orbMat = new THREE.MeshStandardMaterial({
                color: new THREE.Color().setHSL(0.6 + Math.random() * 0.2, 0.8, 0.5),
                emissive: new THREE.Color().setHSL(0.6 + Math.random() * 0.2, 0.8, 0.3),
                emissiveIntensity: 0.3,
                transparent: true,
                opacity: 0.5
            });
            const orb = new THREE.Mesh(new THREE.SphereGeometry(0.1, 16, 16), orbMat);
            orb.position.set((Math.random() - 0.5) * 25, (Math.random() - 0.5) * 20, (Math.random() - 0.5) * 15 - 8);
            scene.add(orb);
            orbs.push(orb);
        }
        
        // Controls (pan and zoom)
        let targetX = 0;
        let targetY = 0;
        let currentX = 0;
        let currentY = 0;
        let targetZoom = 12;
        let currentZoom = 12;
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let dragOffset = { x: 0, y: 0 };
        
        renderer.domElement.addEventListener('mousedown', (e) => {
            if (e.button === 0) {
                isDragging = true;
                dragStart.x = e.clientX;
                dragStart.y = e.clientY;
                dragOffset.x = targetX;
                dragOffset.y = targetY;
                renderer.domElement.style.cursor = 'grabbing';
            }
        });
        
        window.addEventListener('mousemove', (e) => {
            if (isDragging) {
                targetX = dragOffset.x + (e.clientX - dragStart.x) * 0.012;
                targetY = dragOffset.y + (e.clientY - dragStart.y) * 0.012;
            }
        });
        
        window.addEventListener('mouseup', () => {
            isDragging = false;
            renderer.domElement.style.cursor = 'grab';
        });
        
        window.addEventListener('wheel', (e) => {
            targetZoom += e.deltaY * 0.02;
            targetZoom = Math.max(5, Math.min(20, targetZoom));
            e.preventDefault();
        }, { passive: false });
        
        renderer.domElement.style.cursor = 'grab';
        
        // Raycaster for clicking
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        // Modal
        const modal = document.getElementById('artwork-modal');
        const closeModal = document.getElementById('close-modal');
        
        function showModal(artwork) {
            document.getElementById('modal-title').textContent = artwork.name;
            document.getElementById('modal-desc').textContent = artwork.description;
            const techDiv = document.getElementById('modal-tech');
            techDiv.innerHTML = artwork.techStack.map(t => `<span class="tech-badge">${t}</span>`).join('');
            document.getElementById('modal-demo').onclick = () => {
                alert(`✨ ${artwork.name}\n\nDemo would open here!\n\nAdd your actual links to the artworks array.`);
            };
            modal.classList.add('active');
        }
        
        closeModal.onclick = () => modal.classList.remove('active');
        modal.onclick = (e) => { if (e.target === modal) modal.classList.remove('active'); };
        
        renderer.domElement.addEventListener('click', (e) => {
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(group.children, true);
            
            if (intersects.length > 0) {
                let obj = intersects[0].object;
                while (obj.parent && !obj.parent.userData?.artwork && obj !== group) {
                    obj = obj.parent;
                }
                if (obj.parent?.userData?.artwork) {
                    showModal(obj.parent.userData.artwork);
                } else if (obj.userData?.artwork) {
                    showModal(obj.userData.artwork);
                }
            }
        });
        
        // Animation
        let time = 0;
        
        function animate() {
            time += 0.016;
            
            // Smooth camera movement
            currentX += (targetX - currentX) * 0.08;
            currentY += (targetY - currentY) * 0.08;
            currentZoom += (targetZoom - currentZoom) * 0.1;
            
            group.position.x = currentX;
            group.position.y = currentY;
            camera.position.z = currentZoom;
            camera.lookAt(currentX, currentY, 0);
            
            // Animate particles
            particles.rotation.y += 0.002;
            particles.rotation.x += 0.001;
            
            // Animate orbs
            orbs.forEach((orb, i) => {
                orb.position.y += Math.sin(time + i) * 0.003;
                orb.rotation.x += 0.02;
                orb.rotation.y += 0.03;
            });
            
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        animate();
        
        console.log('🎨 Museum loaded! You should see', artworks.length, 'artworks with gold frames. Drag to explore!');
    </script>
</body>
</html>
