<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: 'Inter', 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #050508;
            color: #fff;
        }

        /* Canvas Background */
        #canvas-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Main Content */
        .main-content {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        /* Header / Profile Section */
        .profile-section {
            text-align: center;
            padding: 40px 20px 20px;
            backdrop-filter: blur(10px);
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: 8px;
            background: linear-gradient(135deg, #fff, #ff3366, #ff884d);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 40px rgba(255,51,102,0.3);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ff6680;
        }

        .stat-label {
            font-size: 0.8rem;
            opacity: 0.7;
        }

        .bio {
            max-width: 500px;
            margin: 15px auto;
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .bio h3 {
            color: #ff6680;
            margin-bottom: 5px;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff3366, #ff6680);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255,51,102,0.4);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
        }

        .btn-outline:hover {
            border-color: #ff3366;
            background: rgba(255,51,102,0.1);
        }

        /* Category Navigation */
        .category-nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 20px;
            flex-wrap: wrap;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 20;
        }

        .category-btn {
            padding: 8px 20px;
            border-radius: 30px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.85rem;
        }

        .category-btn.active {
            background: #ff3366;
            box-shadow: 0 0 15px rgba(255,51,102,0.5);
        }

        .category-btn:hover {
            background: #ff6680;
        }

        /* Gallery Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Showcase Card */
        .showcase-card {
            background: rgba(20,20,35,0.7);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }

        .showcase-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(255,51,102,0.5);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .card-image {
            width: 100%;
            height: 260px;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .showcase-card:hover .card-image {
            transform: scale(1.05);
        }

        .card-info {
            padding: 20px;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #ff88aa;
        }

        .card-price {
            font-size: 1.3rem;
            font-weight: bold;
            color: #ffaa44;
            margin: 10px 0;
        }

        .card-description {
            font-size: 0.85rem;
            opacity: 0.8;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            background: rgba(255,51,102,0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #ff88aa;
        }

        /* Modal for Full Details */
        .detail-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .detail-modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-container {
            max-width: 900px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            background: linear-gradient(135deg, #151525, #0a0a15);
            border-radius: 30px;
            border: 1px solid rgba(255,51,102,0.3);
            transform: scale(0.9);
            transition: transform 0.3s;
        }

        .detail-modal.active .modal-container {
            transform: scale(1);
        }

        .modal-image {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
        }

        .modal-info {
            padding: 30px;
        }

        .modal-title {
            font-size: 1.8rem;
            color: #ff88aa;
            margin-bottom: 10px;
        }

        .modal-price {
            font-size: 2rem;
            color: #ffaa44;
            font-weight: bold;
            margin: 15px 0;
        }

        .modal-description {
            line-height: 1.6;
            margin: 20px 0;
        }

        .contact-buttons {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 30px;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .close-modal:hover {
            background: #ff3366;
            transform: rotate(90deg);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 30px;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 0.8rem;
            opacity: 0.6;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a15;
        }
        ::-webkit-scrollbar-thumb {
            background: #ff3366;
            border-radius: 10px;
        }

        @media (max-width: 768px) {
            .logo { font-size: 2rem; letter-spacing: 4px; }
            .gallery-grid { padding: 20px; gap: 15px; grid-template-columns: 1fr; }
            .stats { gap: 20px; }
            .category-nav { gap: 8px; }
            .category-btn { padding: 6px 12px; font-size: 0.7rem; }
        }

</head>

    <script>
        // ========== INTERACTIVE BACKGROUND PARTICLES ==========
        // Particles that react to mouse movement and scroll!
        
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let particles = [];
        let mouseX = 0, mouseY = 0;
        let scrollOffset = 0;
        
        class InteractiveParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.originalX = x;
                this.originalY = y;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = 0;
                this.speedY = 0;
                this.color = `hsl(${Math.random() * 60 + 330}, 70%, 60%)`; // Pink/red range
                this.alpha = Math.random() * 0.5 + 0.2;
            }
            
            update() {
                // Mouse influence - particles move away from cursor
                const dx = this.x - mouseX;
                const dy = this.y - mouseY;
                const distance = Math.sqrt(dx * dx + dy * dy);
                const maxDist = 150;
                
                if (distance < maxDist) {
                    const force = (maxDist - distance) / maxDist;
                    const angle = Math.atan2(dy, dx);
                    const moveX = Math.cos(angle) * force * 1.5;
                    const moveY = Math.sin(angle) * force * 1.5;
                    this.speedX += moveX;
                    this.speedY += moveY;
                }
                
                // Return to original position with spring effect
                this.speedX += (this.originalX - this.x) * 0.02;
                this.speedY += (this.originalY - this.y) * 0.02;
                
                // Damping
                this.speedX *= 0.95;
                this.speedY *= 0.95;
                
                this.x += this.speedX;
                this.y += this.speedY;
            }
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 8;
                ctx.shadowColor = '#ff3366';
                ctx.globalAlpha = this.alpha;
                ctx.fill();
            }
        }
        
        function initParticles() {
            particles = [];
            const particleCount = Math.min(300, Math.floor(width * height / 8000));
            for (let i = 0; i < particleCount; i++) {
                const x = Math.random() * width;
                const y = Math.random() * height;
                particles.push(new InteractiveParticle(x, y));
            }
        }
        
        function animateParticles() {
            ctx.clearRect(0, 0, width, height);
            
            // Draw gradient background
            const gradient = ctx.createLinearGradient(0, 0, width, height);
            gradient.addColorStop(0, '#050508');
            gradient.addColorStop(0.5, '#0a0a15');
            gradient.addColorStop(1, '#0f0f1a');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
            
            // Draw connecting lines between nearby particles
            ctx.beginPath();
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 100) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(255, 51, 102, ${0.15 * (1 - distance / 100)})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
            
            // Update and draw particles
            for (let particle of particles) {
                particle.update();
                particle.draw();
            }
            
            requestAnimationFrame(animateParticles);
        }
        
        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            initParticles();
        }
        
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        window.addEventListener('scroll', () => {
            scrollOffset = window.scrollY;
        });

        // Current filter category
        let currentCategory = "all";
        
        // Render gallery
        function renderGallery() {
            const grid = document.getElementById('gallery-grid');
            const filtered = currentCategory === "all" 
                ? showcaseItems 
                : showcaseItems.filter(item => item.category === currentCategory);
            
            if (filtered.length === 0) {
                grid.innerHTML = '<div style="text-align: center; grid-column: 1/-1; padding: 60px; opacity: 0.7;">✨ No items in this category yet. Check back soon!</div>';
                return;
            }
            
            grid.innerHTML = filtered.map(item => `
                <div class="showcase-card" data-id="${item.id}">
                    <img class="card-image" src="${item.image}" alt="${item.name}" loading="lazy">
                    <div class="card-info">
                        <div class="card-title">${item.name}</div>
                        <div class="card-price">${item.price}</div>
                        <div class="card-description">${item.description.substring(0, 100)}${item.description.length > 100 ? '...' : ''}</div>
                        <div class="card-tags">
                            ${item.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                        </div>
                    </div>
                </div>
            `).join('');
            
            // Add click handlers
            document.querySelectorAll('.showcase-card').forEach(card => {
                card.addEventListener('click', () => {
                    const id = parseInt(card.dataset.id);
                    const item = showcaseItems.find(i => i.id === id);
                    if (item) openModal(item);
                });
            });

        const modal = document.getElementById('detail-modal');
        const closeModalBtn = document.getElementById('close-modal-btn');
        
        function openModal(item) {
            document.getElementById('modal-img').src = item.image;
            document.getElementById('modal-title').textContent = item.name;
            document.getElementById('modal-price').innerHTML = `${item.price} <span style="font-size: 0.9rem; opacity: 0.7;">(~${item.priceUSD})</span>`;
            document.getElementById('modal-desc').textContent = item.description;
            
            const modalWhatsapp = document.getElementById('modal-whatsapp');
            const modalInstagram = document.getElementById('modal-instagram');
            
            modalWhatsapp.onclick = () => {
                const msg = encodeURIComponent(`Hi! I'm interested in the ${item.name}. Is it still available?`);
                window.open(`https://wa.me/255755143519?text=${msg}`, '_blank');
            };
            
            modalInstagram.onclick = () => {
                window.open('https://instagram.com/boompixel', '_blank');
            };
            
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        closeModalBtn.onclick = () => {
            modal.classList.remove('active');
            document.body.style.overflow = '';
        };
        
        modal.onclick = (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
                document.body.style.overflow = '';
            }
        };
        
        // Category filtering
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
                renderGallery();
            });
        });
        
        // Social buttons
        document.getElementById('whatsapp-btn').onclick = () => {
            window.open('https://wa.me/255755143519', '_blank');
        };
        
        document.getElementById('instagram-btn').onclick = () => {
            window.open('https://instagram.com/boompixel', '_blank');
        };
        
        document.getElementById('contact-btn').onclick = () => {
            window.open('mailto:info@boompixel.com?subject=Inquiry from Boom Pixel Website', '_blank');
        };
        
        // Initialize
        renderGallery();
        
        // Add hover particle effect to cards (small interaction)
        document.addEventListener('mousemove', (e) => {
            const cards = document.querySelectorAll('.showcase-card');
            cards.forEach(card => {
                const rect = card.getBoundingClientRect();
                const isHover = e.clientX >= rect.left && e.clientX <= rect.right && 
                                e.clientY >= rect.top && e.clientY <= rect.bottom;
                if (isHover) {
                    card.style.transform = 'translateY(-5px) scale(1.01)';
                } else {
                    card.style.transform = '';
                }
            });
        });
    </script>
</body>
</html>
